name: Commit Convention

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?(!)?: .{1,100}$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
            git fetch origin "${{ github.base_ref }}" --depth=1
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi

          mapfile -t SUBJECTS < <(git log --format=%s "$RANGE")

          if [[ ${#SUBJECTS[@]} -eq 0 ]]; then
            echo "No commits found in range: $RANGE"
            exit 0
          fi

          FAIL=0
          for msg in "${SUBJECTS[@]}"; do
            if ! [[ "$msg" =~ $PATTERN ]]; then
              echo "Invalid commit subject: $msg"
              FAIL=1
            fi
          done

          if [[ "$FAIL" -ne 0 ]]; then
            echo "Commit message validation failed."
            exit 1
          fi

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?(!)?: .{1,100}$'
          TITLE="${{ github.event.pull_request.title }}"
          if ! [[ "$TITLE" =~ $PATTERN ]]; then
            echo "Invalid PR title: $TITLE"
            exit 1
          fi

