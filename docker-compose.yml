services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: gva
      MYSQL_USER: gva
      MYSQL_PASSWORD: "Gva_Pass!2025"
      MYSQL_ROOT_PASSWORD: "Root_Pass!2025"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pRoot_Pass!2025"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    volumes:
      - ./redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gowebframe &&
      mc anonymous set download local/gowebframe
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      SEED_ADMIN_ENABLED: "true"
      SEED_ADMIN_USERNAME: "admin"
      SEED_ADMIN_PASSWORD: "Admin@123456"
      SEED_ADMIN_AUTHORITY_ID: "1"
      SEED_ADMIN_DEFAULT_ROUTER: "dashboard/workplace"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend/configs:/app/configs
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
