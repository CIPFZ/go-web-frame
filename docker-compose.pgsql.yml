services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: gva
      POSTGRES_USER: gva
      POSTGRES_PASSWORD: "Gva_Pass!2025"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gva -d gva"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    depends_on: !override
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  pgsql_data:
